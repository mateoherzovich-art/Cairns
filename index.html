<!DOCTYPE html>
<html lang="es">
<head>

<title>Mateo · Cairns 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
         background: #F5F4F1; min-height: 100vh; max-width: 480px; margin: 0 auto;
         padding-bottom: 80px; color: #1A1A1A; }
  button { cursor: pointer; font-family: inherit; }

  .header { background: #111; color: #fff; padding: 52px 20px 18px; }
  .header-label { font-size: 10px; letter-spacing: 2.5px; opacity: 0.4; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { background: #222; border-radius: 20px; padding: 5px 12px; display: flex; gap: 6px; align-items: center; }
  .pill-label { font-size: 10px; opacity: 0.45; }
  .pill-value { font-size: 12px; font-weight: 700; }

  .tabs { display: flex; background: #fff; border-bottom: 1px solid #E8E8E8; position: sticky; top: 0; z-index: 50; }
  .tab { flex: 1; padding: 13px 0; border: none; background: none; font-size: 12px; font-weight: 500;
         color: #999; border-bottom: 2px solid transparent; }
  .tab.active { font-weight: 700; color: #111; border-bottom-color: #111; }

  .section { padding: 12px 12px 0; }
  .card { background: #fff; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
  .card-dark { background: #111; color: #fff; border-radius: 14px; margin-bottom: 10px; padding: 18px; }

  .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 6px; }
  .week-nav-btn { background: none; border: 1px solid #DDD; border-radius: 8px; width: 36px; height: 36px;
                  font-size: 20px; color: #555; display: flex; align-items: center; justify-content: center; }
  .week-label { text-align: center; }
  .week-label-main { font-size: 13px; font-weight: 600; color: #555; }
  .week-label-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .week-label-sub span { color: #2D7A5F; font-weight: 700; }

  .day-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; }
  .day-date { min-width: 36px; }
  .day-name { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .day-num { font-size: 20px; font-weight: 800; line-height: 1; }
  .day-num.today { color: #E85D2F; }
  .day-shifts { flex: 1; }
  .day-totals { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; min-width: 58px; }
  .add-btn { background: #F0F0F0; border: none; border-radius: 6px; width: 26px; height: 26px;
             font-size: 16px; color: #555; display: flex; align-items: center; justify-content: center; margin-top: 4px; }

  .shift-chip { display: inline-flex; flex-direction: column; border-radius: 8px; padding: 5px 10px;
                margin-right: 6px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; }
  .chip-top { display: flex; align-items: center; gap: 5px; }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip-bottom { font-size: 11px; color: #888; margin-top: 2px; padding-left: 12px; }
  .no-shifts { font-size: 12px; color: #CCC; }

  .progress-wrap { height: 8px; background: #2A2A2A; border-radius: 4px; overflow: hidden; margin: 10px 0 6px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  .savings-row { display: flex; justify-content: space-between; align-items: center;
                 padding: 11px 16px; border-bottom: 1px solid #F0F0F0; cursor: pointer; }
  .savings-row:last-child { border-bottom: none; }
  .savings-row:active { background: #F9F9F9; }

  .visa-row { display: flex; align-items: center; padding: 9px 16px; border-bottom: 1px solid #F0F0F0; gap: 10px; }
  .visa-row:last-child { border-bottom: none; }
  .visa-hours-input { width: 58px; border: 1px solid #E0E0E0; border-radius: 8px; padding: 5px 8px;
                      font-size: 13px; font-family: inherit; text-align: center; background: #FAFAFA; }
  .visa-hours-input:focus { outline: none; border-color: #111; background: #fff; }

  .modal-overlay { position: fixed; inset: 0; background: #00000070; display: flex;
                   align-items: flex-end; z-index: 200; }
  .modal-box { background: #fff; border-radius: 20px 20px 0 0; padding: 24px;
               width: 100%; max-width: 480px; margin: 0 auto; }

  .modal-sub { font-size: 12px; color: #999; margin-bottom: 18px; }

  .emp-btns { display: flex; gap: 8px; }
  .emp-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: 2px solid #E0E0E0;

  .emp-btn.active-av { border-color: #2D7A5F; background: #E8F5F0; color: #2D7A5F; }
  .time-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .time-field { flex: 1; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid #E0E0E0; border-radius: 10px;
                font-size: 16px; font-family: inherit; }
  .form-input:focus { outline: none; border-color: #111; }

  .preview-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

<script>
// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const EMPLOYERS = {

  annees:   { name:"Annee's Vietnamese Café", color:'#2D7A5F', light:'#E8F5F0', short:'AV' }
};
const DAYS_SHORT = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAYS_ES    = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// ══════════════════════════════════════════════════════
// RATES & TAX
// ══════════════════════════════════════════════════════
function dowOf(ds){ return new Date(ds+'T12:00:00').getDay(); }

function hourlyRate(emp, ds){
  const d=dowOf(ds);
  if(emp==='bushfire'){ if(d===0)return 45.2375; if(d===6)return 38.775; if(d===5)return 32.3975; return 32.40; }
  if(emp==='annees'){   if(d===0)return 41.7148; if(d===6)return 41.7156; return 33.1867; }
  return 0;
}

const TAX_BRACKETS=[{l:18200,r:0},{l:45000,r:.19},{l:120000,r:.325},{l:180000,r:.37},{l:Infinity,r:.45}];
function annualTax(inc){ let t=0,p=0; for(const{l,r}of TAX_BRACKETS){if(inc<=p)break;t+=(Math.min(inc,l)-p)*r;p=l;} return t; }
function bfRate(){ // effective rate based on logged BF hours
  const bfs=Object.values(APP.shifts).flat().filter(s=>s.employer==='bushfire');
  const g=bfs.reduce((a,s)=>a+calcHours(s.start,s.end)*hourlyRate('bushfire','2026-07-02'),0); // weekday proxy
  const h=bfs.reduce((a,s)=>a+calcHours(s.start,s.end),0);
  const avg=h>0?g/h:32.40;
  const ann=avg*15*52;
  return ann>0?annualTax(ann)/ann:0;
}

function calcHours(start,end){
  if(!start||!end)return 0;
  const p=t=>{const[h,m]=t.split(':').map(Number);return h+m/60;};
  const s=p(start);let e=p(end);if(e<s)e+=24;return Math.max(0,e-s);
}
function gross(emp,ds,start,end){ return calcHours(start,end)*hourlyRate(emp,ds); }
function tax(emp,g){ return emp==='annees'?g*0.15:g*bfRate(); }
function net(emp,ds,start,end){ const g=gross(emp,ds,start,end); return g-tax(emp,g); }

function hoursToRegDays(h){
  if(h<4)return 0; if(h<7.25)return 1; if(h<14.25)return 2;
  if(h<21.25)return 3; if(h<28.25)return 4; if(h<35.25)return 5; return 7;
}

function fmt$(n){ return '$'+n.toFixed(2); }
function fmtK(n){ return (n>=0?'$':'−$')+Math.abs(Math.round(n)); }
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return fmtDate(new Date()); }
function getWeekDates(off){
  const now=new Date(),day=now.getDay(),diff=(day===0?-6:1-day)+off*7;
  return Array.from({length:7},(_,i)=>{ const d=new Date(now); d.setDate(now.getDate()+diff+i); return d; });
}

// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
function load(){
  try{ APP.shifts  = JSON.parse(localStorage.getItem('mc_shifts'))  || DEFAULT_SHIFTS;  }catch{ APP.shifts  = DEFAULT_SHIFTS; }
  try{ APP.savings = JSON.parse(localStorage.getItem('mc_savings')) || DEFAULT_SAVINGS; }catch{ APP.savings = DEFAULT_SAVINGS; }
  try{ APP.visa    = JSON.parse(localStorage.getItem('mc_visa'))    || DEFAULT_VISA;    }catch{ APP.visa    = DEFAULT_VISA; }
}
function save(){
  try{
    localStorage.setItem('mc_shifts',  JSON.stringify(APP.shifts));
    localStorage.setItem('mc_savings', JSON.stringify(APP.savings));
    localStorage.setItem('mc_visa',    JSON.stringify(APP.visa));
  }catch{}
}

// ══════════════════════════════════════════════════════
// COMPUTED
// ══════════════════════════════════════════════════════
function allShifts(){ return Object.entries(APP.shifts).flatMap(([date,ds])=>ds.map(s=>({...s,date}))); }
function totalShiftsNet(){ return allShifts().reduce((a,s)=>a+net(s.employer,s.date,s.start,s.end),0); }

function thisWeekHours(){
  const dates=getWeekDates(0); let h=0;
  dates.forEach(d=>{ const dk=fmtDate(d); (APP.shifts[dk]||[]).forEach(s=>{ h+=calcHours(s.start,s.end); }); });
  return h;
}

function nextShift(){
  const now=new Date(), nowStr=fmtDate(now), nowTime=now.getHours()*60+now.getMinutes();
  const future=Object.entries(APP.shifts).flatMap(([date,ds])=>ds.map(s=>({...s,date})))
    .filter(s=>{ if(s.date>nowStr)return true; if(s.date===nowStr){const[h,m]=s.start.split(':').map(Number);return h*60+m>nowTime;} return false; })
    .sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.start.localeCompare(b.start));
  if(!future.length)return null;
  const s=future[0], d=new Date(s.date+'T12:00:00');
  return DAYS_ES[d.getDay()]+' '+d.getDate()+' '+d.toLocaleDateString('es-AR',{month:'short'})+' '+s.start;
}

function savingsWithAccum(){
  let acum=0;
  return APP.savings.map(w=>{ acum+=w.ahorroSem||0; return {...w,acum}; });
}
function totalSavings(){ const r=savingsWithAccum(); return r.length?r[r.length-1].acum:0; }

function visaAccum(){
  let acum=0;
  return APP.visa.map(w=>{ const days=hoursToRegDays(w.hours||0); acum+=days; return {...w,days,acum}; });
}
function visaTotals(){
  const rows=visaAccum(); const done=rows.length?rows[rows.length-1].acum:0;
  return {done, remaining:Math.max(0,VISA_TARGET-done), pct:Math.min(100,Math.round(done/VISA_TARGET*100))};
}

function render(){

}

function html(){

      <div class="pill"><span class="pill-label">Hrs esta semana</span><span class="pill-value" style="color:#93C5FD">${thisWeekHours().toFixed(1)}h</span></div>
      ${(()=>{ const ns=nextShift(); return ns?`<div class="pill"><span class="pill-label">Próximo turno</span><span class="pill-value" style="color:#C4B5FD">${ns}</span></div>`:''; })()}
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${APP.tab==='shifts'?'active':''}" onclick="APP.tab='shifts';render()">Turnos</button>
    <button class="tab ${APP.tab==='savings'?'active':''}" onclick="APP.tab='savings';render()">Ahorros</button>
    <button class="tab ${APP.tab==='visa'?'active':''}" onclick="APP.tab='visa';render()">88 Días</button>
  </div>
  ${APP.tab==='shifts'  ? shiftsTab()  : ''}
  ${APP.tab==='savings' ? savingsTab() : ''}
  ${APP.tab==='visa'    ? visaTab()    : ''}
  ${APP.modal ? modalHtml() : ''}`;
}

// ── SHIFTS TAB ─────────────────────────────────────────
function shiftsTab(){
  const dates = getWeekDates(APP.weekOffset);
  const wLabel = APP.weekOffset===0?'Esta semana':APP.weekOffset===1?'Próxima semana':
    APP.weekOffset===-1?'Semana pasada':`${dates[0].getDate()}/${dates[0].getMonth()+1} – ${dates[6].getDate()}/${dates[6].getMonth()+1}`;

  let wg=0,wn=0,wh=0;
  dates.forEach(d=>{ const dk=fmtDate(d); (APP.shifts[dk]||[]).forEach(s=>{ wg+=gross(s.employer,dk,s.start,s.end); wn+=net(s.employer,dk,s.start,s.end); wh+=calcHours(s.start,s.end); }); });

  const dayRows = dates.map((date,i)=>{
    const dk=fmtDate(date), ds=APP.shifts[dk]||[];
    let dg=0,dn=0,dh=0;
    ds.forEach(s=>{ dg+=gross(s.employer,dk,s.start,s.end); dn+=net(s.employer,dk,s.start,s.end); dh+=calcHours(s.start,s.end); });
    const isT = dk===todayStr();
    const chips = ds.length===0 ? `<span class="no-shifts">Sin turnos</span>`
      : ds.map(s=>{
          const emp=EMPLOYERS[s.employer];
          const h=calcHours(s.start,s.end), g=gross(s.employer,dk,s.start,s.end), n2=net(s.employer,dk,s.start,s.end);
          return `<div class="shift-chip" style="background:${emp.light};border-color:${emp.color}33"
                    onclick="openShiftEdit('${dk}','${s.id}')">
            <div class="chip-top">
              <div class="chip-dot" style="background:${emp.color}"></div>
              <span style="font-size:12px;font-weight:700;color:${emp.color}">${emp.short}</span>
              <span style="font-size:12px;color:#555">${s.start}–${s.end}</span>
            </div>
            <div class="chip-bottom">${h.toFixed(1)}h · ${fmt$(g)} → <span style="color:#2D7A5F;font-weight:600">${fmt$(n2)}</span></div>
          </div>`;
        }).join('');
    return `<div class="card" style="border:2px solid ${isT?'#111':'transparent'}">
      <div class="day-row">
        <div class="day-date">
          <div class="day-name">${DAYS_SHORT[i]}</div>
          <div class="day-num ${isT?'today':''}">${date.getDate()}</div>
        </div>
        <div class="day-shifts">${chips}</div>
        <div class="day-totals">
          ${dh>0?`<span style="font-size:10px;color:#bbb">${dh.toFixed(1)}h</span><span style="font-size:11px;color:#999">${fmt$(dg)}</span><span style="font-size:12px;font-weight:700;color:#2D7A5F">${fmt$(dn)}</span>`:''}
          <button class="add-btn" onclick="openShiftNew('${dk}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="week-nav">
    <button class="week-nav-btn" onclick="APP.weekOffset--;render()">‹</button>
    <div class="week-label">
      <div class="week-label-main">${wLabel}</div>
      ${wh>0?`<div class="week-label-sub">${wh.toFixed(1)}h · ${fmt$(wg)} · <span>${fmt$(wn)} neto</span></div>`:''}
    </div>
    <button class="week-nav-btn" onclick="APP.weekOffset++;render()">›</button>
  </div>
  <div class="section">
    ${dayRows}
    <div class="note-box">
      <div class="note-title">Tarifas</div>
      <div class="note-body">BF primario · escala ATO 2025-26 sin Medicare (WHV 462) · AV secundario 15% flat con TFN</div>
    </div>
  </div>`;
}

// ── SAVINGS TAB ────────────────────────────────────────
function savingsTab(){
  const rows = savingsWithAccum();
  const total = totalSavings();
  const totalInc = APP.savings.reduce((a,w)=>a+(w.netBF||0)+(w.netAV||0),0);
  const totalExp = APP.savings.reduce((a,w)=>a+(w.hospedaje||0)+(w.gastos||0),0);

  const tableRows = rows.map((w,i)=>`
    <div class="savings-row" onclick="openSavingsEdit(${i})">
      <div>
        <div style="font-size:12px;font-weight:600;color:#555">Sem ${i+1}</div>
        <div style="font-size:11px;color:#bbb;margin-top:1px">${w.period}</div>
      </div>
      <div style="text-align:center;flex:1;padding:0 8px">
        <div style="font-size:11px;color:#999">${fmtK(w.netBF+w.netAV)} − ${fmtK(w.hospedaje+w.gastos)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:700" class="${w.ahorroSem>=0?'positive':'negative'}">${w.ahorroSem>=0?'+':''}${fmtK(w.ahorroSem)}</div>
        <div style="font-size:11px;color:#999;margin-top:1px">${fmtK(w.acum)} acum.</div>
      </div>
    </div>`).join('');

  return `<div class="section">
    <div class="card-dark">
      <div style="font-size:10px;opacity:.45;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Ahorros acumulados</div>
      <div style="font-size:42px;font-weight:800;color:#6EE7B7;line-height:1;margin-bottom:4px">${fmtK(total)}</div>
      <div style="font-size:11px;opacity:.4;margin-bottom:14px">desde semana 1</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:16px;font-weight:800;color:#93C5FD">${fmtK(totalInc)}</div>
          <div style="font-size:10px;opacity:.4">ingresos netos</div>
        </div>
        <div>
          <div style="font-size:16px;font-weight:800;color:#FCA5A5">${fmtK(totalExp)}</div>
          <div style="font-size:10px;opacity:.4">gastos totales</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div style="padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F0F0F0">
        <span style="font-size:12px;font-weight:700">Registro semanal</span>
        <button onclick="openSavingsNew()" style="background:#111;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600">+ Semana</button>
      </div>
      ${tableRows}
    </div>
    <div class="note-box">
      <div class="note-title">Cómo funciona</div>
      <div class="note-body">El ahorro semanal lo ingresás vos — así refleja exactamente lo que registraste en el Excel. Tocá cualquier fila para editar.</div>
    </div>
  </div>`;
}

// ── VISA TAB ───────────────────────────────────────────
function visaTab(){
  const rows = visaAccum();
  const vt = visaTotals();
  const totalHours = APP.visa.reduce((a,w)=>a+(w.hours||0),0);
  const weeksLeft = APP.visa.filter(w=>(w.hours||0)===0).length;
  const needed = weeksLeft>0?Math.ceil(vt.remaining/weeksLeft):0;

  const tableRows = rows.map((w,i)=>{
    const hasHours = w.hours>0;
    const statusIcon = !hasHours?'':w.days===7?'🔥':w.days>=5?'⚡':w.days>=3?'✓':'⚠️';
    const daysColor = w.days===7?'#E85D2F':w.days>=5?'#F5A623':w.days>=3?'#2D7A5F':'#999';
    return `<div class="visa-row">
      <span style="font-size:11px;color:#999;min-width:22px">${i+1}</span>
      <span style="font-size:12px;color:#555;flex:1">${w.period}</span>
      <input class="visa-hours-input" type="number" step="0.25" min="0" max="84"
        value="${w.hours||''}" placeholder="0h"
        onchange="updateVisa(${i},this.value)">
      <span style="font-size:13px;font-weight:700;color:${daysColor};min-width:28px;text-align:right">${hasHours?w.days+'d':'–'}</span>
      <span style="font-size:14px;min-width:22px;text-align:right">${statusIcon}</span>
    </div>`;
  }).join('');

  return `<div class="section">
    <div class="card-dark">
      <div style="font-size:10px;opacity:.45;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Visa 462 · Deadline ${VISA_DEADLINE}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">
        <div>
          <div style="font-size:42px;font-weight:800;color:#F5A623;line-height:1">${vt.done}<span style="font-size:18px;opacity:.5">/${VISA_TARGET}</span></div>
          <div style="font-size:11px;opacity:.4;margin-top:4px">días regionales</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:800;color:#FCA5A5">${vt.remaining}<span style="font-size:12px;opacity:.5"> restantes</span></div>
          <div style="font-size:10px;opacity:.4;margin-top:2px">${vt.pct}% completado</div>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${vt.pct}%;background:#F5A623"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px">
        <div><div style="font-size:15px;font-weight:800;color:#6EE7B7">${totalHours.toFixed(0)}h</div><div style="font-size:10px;opacity:.4">horas totales</div></div>
        <div><div style="font-size:15px;font-weight:800;color:#93C5FD">${weeksLeft}</div><div style="font-size:10px;opacity:.4">semanas libres</div></div>
        <div><div style="font-size:15px;font-weight:800;color:${needed<=5?'#6EE7B7':needed<=7?'#F5A623':'#FCA5A5'}">${needed}d/sem</div><div style="font-size:10px;opacity:.4">necesario</div></div>
      </div>
    </div>
    <div class="card">
      <div style="padding:10px 16px 4px;font-size:11px;color:#999;border-bottom:1px solid #F0F0F0">
        Ingresá las horas por semana — los días se calculan solos
      </div>
      ${tableRows}
    </div>
    <div class="note-box">
      <div class="note-title">Tabla de equivalencia</div>
      <div class="note-body">&lt;4h=0d · 4–7h=1d · 7.25–14h=2d · 14.25–21h=3d · 21.25–28h=4d · 28.25–35h=5d · 35.25h+=7d</div>
    </div>
  </div>`;
}

// ── MODAL ──────────────────────────────────────────────
function modalHtml(){
  const m=APP.modal;
  if(m.type==='shift')   return shiftModal(m);
  if(m.type==='savings') return savingsModal(m);
  return '';
}

function shiftModal(m){
  const h=calcHours(m.start,m.end);
  const g=h>0?gross(m.employer,m.dateKey,m.start,m.end):0;
  const t=h>0?tax(m.employer,g):0;
  const n=g-t;
  const dow=m.dateKey?DAYS_ES[dowOf(m.dateKey)]:'';
  return `<div class="modal-overlay" onclick="if(event.target===this){APP.modal=null;render()}">
    <div class="modal-box">
      <div class="modal-title">${m.editing?'Editar turno':'Agregar turno'}</div>
      <div class="modal-sub">${m.dateKey} · ${dow}</div>
      <div class="field-group">
        <label class="field-label">Empleador</label>
        <div class="emp-btns">
          <button class="emp-btn ${m.employer==='bushfire'?'active-bf':''}" onclick="APP.modal.employer='bushfire';render()">BF Bushfire</button>
          <button class="emp-btn ${m.employer==='annees'?'active-av':''}" onclick="APP.modal.employer='annees';render()">AV Annee's</button>
        </div>
      </div>
      <div class="time-row">
        <div class="time-field"><label class="field-label">Entrada</label>
          <input class="form-input" type="time" value="${m.start||''}" oninput="APP.modal.start=this.value;render()"></div>
        <div class="time-field"><label class="field-label">Salida</label>
          <input class="form-input" type="time" value="${m.end||''}" oninput="APP.modal.end=this.value;render()"></div>
      </div>
      ${h>0?`<div class="modal-preview">
        <div class="preview-row"><span style="font-size:12px;color:#999">Horas</span><span style="font-size:13px">${h.toFixed(2)}h</span></div>
        <div class="preview-row"><span style="font-size:12px;color:#999">Bruto</span><span style="font-size:13px;color:#555">${fmt$(g)}</span></div>
        <div class="preview-row"><span style="font-size:12px;color:#999">Retención</span><span style="font-size:13px;color:#E85D2F">−${fmt$(t)}</span></div>
        <div class="preview-divider"><span style="font-size:13px;font-weight:700">Neto estimado</span><span style="font-size:15px;font-weight:800;color:#2D7A5F">${fmt$(n)}</span></div>
      </div>`:''}
      <div class="modal-btns">
        ${m.editing?`<button class="btn-del" onclick="deleteShift()">Eliminar</button>`:''}
        <button class="btn-save" onclick="saveShift()">${m.editing?'Guardar':'Agregar turno'}</button>
      </div>
    </div>
  </div>`;
}

function savingsModal(m){
  return `<div class="modal-overlay" onclick="if(event.target===this){APP.modal=null;render()}">
    <div class="modal-box">
      <div class="modal-title">${m.editing?'Editar semana':'Nueva semana'}</div>
      <div class="modal-sub">${m.period||'Nueva entrada'}</div>
      <div class="field-group">
        <label class="field-label">Período</label>
        <input class="form-input" type="text" value="${m.period||''}" placeholder="Ej: 29 jun–5 jul"
          oninput="APP.modal.period=this.value">
      </div>
      <div class="time-row">
        <div class="time-field"><label class="field-label">Neto Bushfire $</label>
          <input class="form-input" type="number" step="0.01" value="${m.netBF||''}" placeholder="0.00"
            oninput="APP.modal.netBF=parseFloat(this.value)||0"></div>
        <div class="time-field"><label class="field-label">Neto Annee's $</label>
          <input class="form-input" type="number" step="0.01" value="${m.netAV||''}" placeholder="0.00"
            oninput="APP.modal.netAV=parseFloat(this.value)||0"></div>
      </div>
      <div class="time-row">
        <div class="time-field"><label class="field-label">Hospedaje $</label>
          <input class="form-input" type="number" step="1" value="${m.hospedaje!=null?m.hospedaje:FIXED_HOSPEDAJE}"
            oninput="APP.modal.hospedaje=parseFloat(this.value)||0"></div>
        <div class="time-field"><label class="field-label">Gastos variables $</label>
          <input class="form-input" type="number" step="1" value="${m.gastos||''}" placeholder="0"
            oninput="APP.modal.gastos=parseFloat(this.value)||0"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Ahorro de la semana $</label>
        <input class="form-input" type="number" step="1" value="${m.ahorroSem!=null?m.ahorroSem:''}" placeholder="0"
          oninput="APP.modal.ahorroSem=parseFloat(this.value)||0">
        <div style="font-size:11px;color:#999;margin-top:6px">Ingresá el número que tenés en tu Excel. El acumulado se calcula solo.</div>
      </div>
      <div class="modal-btns">
        ${m.editing?`<button class="btn-del" onclick="deleteSavings()">Eliminar</button>`:''}
        <button class="btn-save" onclick="saveSavings()">${m.editing?'Guardar':'Agregar semana'}</button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════
function openShiftNew(dk){
  APP.modal={type:'shift',dateKey:dk,editing:false,employer:'bushfire',start:'08:00',end:'16:00'};render();
}
function openShiftEdit(dk,id){
  const s=(APP.shifts[dk]||[]).find(s=>s.id===id);
  if(s) APP.modal={type:'shift',dateKey:dk,editing:true,...s};render();
}
function saveShift(){
  const m=APP.modal, dk=m.dateKey, newId=m.id||Date.now().toString();
  const ex=APP.shifts[dk]||[];
  APP.shifts[dk]=m.editing?ex.map(s=>s.id===m.id?{id:m.id,employer:m.employer,start:m.start,end:m.end}:s)
                           :[...ex,{id:newId,employer:m.employer,start:m.start,end:m.end}];
  save(); APP.modal=null; render();
}
function deleteShift(){
  const{dateKey,id}=APP.modal;
  APP.shifts[dateKey]=(APP.shifts[dateKey]||[]).filter(s=>s.id!==id);
  save(); APP.modal=null; render();
}

function openSavingsNew(){
  APP.modal={type:'savings',editing:false,period:'',netBF:0,netAV:0,hospedaje:FIXED_HOSPEDAJE,gastos:0,ahorroSem:0};render();
}
function openSavingsEdit(i){
  APP.modal={type:'savings',editing:true,idx:i,...APP.savings[i]};render();
}
function saveSavings(){
  const m=APP.modal;
  const entry={id:m.editing?APP.savings[m.idx].id:'s'+Date.now(),
    period:m.period||'—',netBF:m.netBF||0,netAV:m.netAV||0,
    hospedaje:m.hospedaje!=null?m.hospedaje:FIXED_HOSPEDAJE,
    gastos:m.gastos||0,ahorroSem:m.ahorroSem||0};
  if(m.editing)APP.savings[m.idx]=entry; else APP.savings.push(entry);
  save(); APP.modal=null; render();
}
function deleteSavings(){
  APP.savings.splice(APP.modal.idx,1);save();APP.modal=null;render();
}

function updateVisa(i,val){
  APP.visa[i].hours=parseFloat(val)||0; save(); render();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
load();
render();
</script>
</body>
</html>
